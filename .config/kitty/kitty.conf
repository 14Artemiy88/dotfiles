# Generated by Home Manager.
# See https://sw.kovidgoyal.net/kitty/conf.html
# Shell integration is sourced and configured manually
shell_integration no-rc

active_border_color #4169E1
active_tab_background #00cccc
active_tab_foreground #000000
allow_remote_control yes
background #181818
background_opacity 0.900000
click_interval 0.500000
color0 #000000
color1 #FF605A
color10 #B1E869
color11 #EAD89C
color12 #5DA9F6
color13 #E86AFF
color14 #82FFFF
color15 #dddddd
color2 #B1E869
color3 #EAD89C
color4 #5DA9F6
color5 #E86AFF
color6 #82FFFF
color7 #dddddd
color8 #000000
color9 #FF605A
confirm_os_window_close 0
cursor #aaaaaa
cursor_blink_interval 0.500000
cursor_shape beam
cursor_stop_blinking_after 5.000000
cursor_trail 100
cursor_trail_color #00cccc
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 10
enable_audio_bell yes
font_family JetBrainsMonoNF
font_size 9.000000
foreground #dddddd
hide_window_decorations titlebar-only
inactive_border_color #367588
inactive_tab_background #999999
inactive_tab_foreground #222222
inactive_text_alpha 0.200000
input_delay 3
macos_option_as_alt no
macos_titlebar_color background
modify_font cell_height 100%
mouse_hide_wait 1.000000
notify_on_cmd_finish invisible 5
open_url_modifiers ctrl+shift
open_url_with default
repaint_delay 10
scrollback_lines 2000
scrollback_pager less +G -R
selection_background #aaaaaa
selection_foreground #000000
shell_integration no-cursor
tab_bar_edge bottom
tab_powerline_style round
term xterm-kitty
visual_bell_duration 10.000000
wheel_scroll_multiplier 5.000000
window_border_width 1
window_padding_width 10





# Clipboard
map super+v             paste_from_clipboard
map ctrl+shift+s        paste_from_selection
map super+c             copy_to_clipboard
map shift+insert        paste_from_selection

# Scrolling
map ctrl+shift+up        scroll_line_up
map ctrl+shift+down      scroll_line_down
map ctrl+shift+k         scroll_line_up
map ctrl+shift+j         scroll_line_down
map ctrl+shift+page_up   scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home      scroll_home
map ctrl+shift+end       scroll_end
map ctrl+shift+h         show_scrollback

# Window management
map super+n              new_os_window
map super+w              close_window
map ctrl+shift+enter     new_window
map ctrl+shift+]         next_window
map ctrl+shift+[         previous_window
map ctrl+shift+f         move_window_forward
map ctrl+shift+b         move_window_backward
map ctrl+shift+`         move_window_to_top
map ctrl+shift+1         first_window
map ctrl+shift+2         second_window
map ctrl+shift+3         third_window
map ctrl+shift+4         fourth_window
map ctrl+shift+5         fifth_window
map ctrl+shift+6         sixth_window
map ctrl+shift+7         seventh_window
map ctrl+shift+8         eighth_window
map ctrl+shift+9         ninth_window
map ctrl+shift+0         tenth_window

# Tab management
map ctrl+shift+right            next_tab
map ctrl+shift+left             previous_tab
map ctrl+shift+t         new_tab
map ctrl+shift+q         close_tab
map ctrl+shift+l         next_layout
map ctrl+shift+right     move_tab_forward
map ctrl+shift+left      move_tab_backward

# Изменение размера шрифта
# map ctrl+shift+up        increase_font_size
# map ctrl+shift+down      decrease_font_size
map ctrl+shift+backspace restore_font_size

